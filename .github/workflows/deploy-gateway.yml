name: Deploy Gateway Service to Render

on:
  push:
    branches:
      - main
    paths:
      - 'backend/api-gateway/**' # 💡 Runs only when files inside backend/api-gateway change

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/api-gateway
          tags: |
            type=raw,value=latest

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          # 💡 Fixed: Added backend/ folder path
          file: ./backend/api-gateway/Dockerfile     # 💡 Fixed: Added backend/ folder path
          push: true
          tags: ${{ steps.meta.outputs.tags }}    # 💡 Fixed: steps instead of id
          labels: ${{ steps.meta.outputs.labels }}  # 💡 Fixed: steps instead of id

      - name: Trigger Render Deployment via Webhook
        run: echo "Skipping webhook ping. Image built successfully!"
