# FreelanceCLI - local run with Docker
# Usage: docker-compose up -d
# API Gateway: http://localhost:8080
# Web: run separately (npm run dev in web/)

services:

  postgres-auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASS}
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"

  postgres-tracking:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${TRACKING_DB_USER}
      POSTGRES_PASSWORD: ${TRACKING_DB_PASS}
      POSTGRES_DB: tracking_db
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  auth-service:
    build:
      context: ./backend
      dockerfile: auth-service/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      AUTH_DB_USER: ${AUTH_DB_USER}
      AUTH_DB_PASS: ${AUTH_DB_PASS}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8081:8081"
    depends_on:
      - postgres-auth

  tracking-service:
    build:
      context: ./backend
      dockerfile: tracking-service/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      TRACKING_DB_USER: ${TRACKING_DB_USER}
      TRACKING_DB_PASS: ${TRACKING_DB_PASS}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8082:8082"
    depends_on:
      - postgres-tracking

  report-service:
    build:
      context: ./backend
      dockerfile: report-service/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8083:8083"
    depends_on:
      - redis
      - tracking-service

  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      GATEWAY_AUTH_URI: http://auth-service:8081
      GATEWAY_TRACKING_URI: http://tracking-service:8082
      GATEWAY_REPORTS_URI: http://report-service:8083
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - tracking-service
      - report-service