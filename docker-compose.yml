# FreelanceCLI - Local application run with Cloud/External Infrastructure
# Usage: docker-compose --env-file ./backend/.env.docker up -d

services:

  auth-service:
    build:
      context: ./backend
      dockerfile: auth-service/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      AUTH_DB_URL: ${AUTH_DB_URL}
      AUTH_DB_USER: ${AUTH_DB_USER}
      AUTH_DB_PASS: ${AUTH_DB_PASS}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM: ${RESEND_FROM}
      FRONTEND_ALLOWED_ORIGINS: ${FRONTEND_ALLOWED_ORIGINS}
      RESEND_VERIFY_BASE_URL: ${RESEND_VERIFY_BASE_URL}
    ports:
      - "8081:8081"

  tracking-service:
    build:
      context: ./backend
      dockerfile: tracking-service/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      TRACKING_DB_URL: ${TRACKING_DB_URL}
      TRACKING_DB_USER: ${TRACKING_DB_USER}
      TRACKING_DB_PASS: ${TRACKING_DB_PASS}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_ALLOWED_ORIGINS: ${FRONTEND_ALLOWED_ORIGINS}
    ports:
      - "8082:8082"

  report-service:
    build:
      context: ./backend
      dockerfile: report-service/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      TRACKING_SERVICE_URL: http://tracking-service:8082
      FRONTEND_ALLOWED_ORIGINS: ${FRONTEND_ALLOWED_ORIGINS}
    ports:
      - "8083:8083"

  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      GATEWAY_AUTH_URI: http://auth-service:8081
      GATEWAY_TRACKING_URI: http://tracking-service:8082
      GATEWAY_REPORTS_URI: http://report-service:8083
      FRONTEND_ALLOWED_ORIGINS: ${FRONTEND_ALLOWED_ORIGINS}
    ports:
      - "8080:8080"
