server:
  port: 8083

spring:
  application:
    name: report-service
  data:
    redis:
      host: localhost
      port: 6379

# Tracking service URL (for fetching sessions)
tracking:
  base-url: http://localhost:8082

jwt:
  secret: ${JWT_SECRET:FreelanceCLI-SuperSecretKey-ChangeInProduction-Min32Chars}

# Cache TTL in seconds
report:
  cache-ttl-seconds: 300
