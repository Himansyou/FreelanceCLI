server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

# JWT settings (use env in production)
jwt:
  secret: ${JWT_SECRET:FreelanceCLI-SuperSecretKey-ChangeInProduction-Min32Chars}
  expiration-ms: 86400000  # 24 hours
