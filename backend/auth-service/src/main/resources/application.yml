server:
  port: 8081

spring:
  application:
    name: auth-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  boot:
    admin:
      client:
        url: http://localhost:8084 # Admin server URL
  actuator:
    endpoints:
      web:
        exposure:
          include: health,info,metrics,prometheus
    endpoint:
      health:
        show-details: always

jwt:
  secret: ${JWT_SECRET:dev-secret}
  expiration-ms: 259200000

resend:
  api-key: ${RESEND_API_KEY}
  from: ${RESEND_FROM:noreply@freelance.com}
  verify-base-url: ${RESEND_VERIFY_BASE_URL:http://localhost:5173/verify}
