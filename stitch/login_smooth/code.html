<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #0e0e0e;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }
        .obsidian-glass {
            background: rgba(25, 25, 25, 0.7);
            backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="overflow-hidden">
<!-- Navigation Shell Suppression: Login screen is transactional, but request specifically asked for SideNavBar and TopAppBar to be present -->
<!-- SideNavBar -->
<aside class="fixed left-0 top-0 h-full flex flex-col py-6 px-4 bg-[#0E0E0E] dark:bg-[#0E0E0E] w-64 rounded-r-[2rem] z-50">
<div class="mb-10 px-4">
<h1 class="text-xl font-black tracking-tighter text-[#9CFF93]">FreelanceCLI</h1>
<p class="text-[10px] font-mono uppercase tracking-[0.1em] text-on-surface-variant opacity-50">v1.0.4</p>
</div>
<nav class="flex-1 space-y-2">
<!-- Dashboard (Inactive) -->
<a class="flex items-center gap-3 px-4 py-3 text-[#ABABAB] font-medium hover:bg-[#262626] hover:text-[#FFFFFF] transition-colors duration-200 rounded-2xl" href="#">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="text-sm label-md uppercase tracking-[0.05em]">Dashboard</span>
</a>
<!-- Sessions (Inactive) -->
<a class="flex items-center gap-3 px-4 py-3 text-[#ABABAB] font-medium hover:bg-[#262626] hover:text-[#FFFFFF] transition-colors duration-200 rounded-2xl" href="#">
<span class="material-symbols-outlined" data-icon="terminal">terminal</span>
<span class="text-sm label-md uppercase tracking-[0.05em]">Sessions</span>
</a>
<!-- Reports (Inactive) -->
<a class="flex items-center gap-3 px-4 py-3 text-[#ABABAB] font-medium hover:bg-[#262626] hover:text-[#FFFFFF] transition-colors duration-200 rounded-2xl" href="#">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
<span class="text-sm label-md uppercase tracking-[0.05em]">Reports</span>
</a>
<!-- Settings (Inactive) -->
<a class="flex items-center gap-3 px-4 py-3 text-[#ABABAB] font-medium hover:bg-[#262626] hover:text-[#FFFFFF] transition-colors duration-200 rounded-2xl" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="text-sm label-md uppercase tracking-[0.05em]">Settings</span>
</a>
</nav>
<div class="mt-auto space-y-2">
<button class="w-full bg-primary-container text-on-primary-container font-bold py-3 rounded-2xl flex items-center justify-center gap-2 mb-6 scale-98 active:opacity-80 transition-all">
<span class="material-symbols-outlined" data-icon="add">add</span>
<span class="text-sm">Start Session</span>
</button>
<a class="flex items-center gap-3 px-4 py-3 text-[#ABABAB] font-medium hover:bg-[#262626] hover:text-[#FFFFFF] transition-colors duration-200 rounded-2xl" href="#">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
<span class="text-sm">Profile</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 text-[#ABABAB] font-medium hover:bg-[#262626] hover:text-[#FFFFFF] transition-colors duration-200 rounded-2xl" href="#">
<span class="material-symbols-outlined" data-icon="logout">logout</span>
<span class="text-sm">Logout</span>
</a>
</div>
</aside>
<!-- TopAppBar -->
<header class="flex items-center justify-between ml-64 px-8 py-4 w-[calc(100%-16rem)] sticky top-0 z-40 bg-transparent dark:bg-transparent rounded-b-[2rem]">
<div class="flex items-center bg-surface-container-high rounded-2xl px-4 py-2 w-96 focus-within:bg-[#191919] transition-all">
<span class="material-symbols-outlined text-on-surface-variant mr-3" data-icon="search">search</span>
<input class="bg-transparent border-none focus:ring-0 text-sm w-full text-on-surface" placeholder="Search commands..." type="text"/>
</div>
<div class="flex items-center gap-4">
<button class="p-2 text-[#ABABAB] hover:text-white transition-opacity">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
<button class="p-2 text-[#ABABAB] hover:text-white transition-opacity">
<span class="material-symbols-outlined" data-icon="help_outline">help_outline</span>
</button>
<button class="ml-2 bg-surface-variant text-on-surface px-5 py-2 rounded-xl text-sm font-medium hover:bg-[#2c2c2c] transition-all">
                New Project
            </button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="ml-64 h-[calc(100vh-80px)] flex items-center justify-center p-8 relative overflow-hidden">
<!-- Decorative Background Element -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
<div class="w-full max-w-md relative z-10">
<!-- Login Card -->
<div class="bg-surface-container-low rounded-3xl p-10 border-none shadow-2xl obsidian-glass">
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-16 h-16 bg-surface-container-highest rounded-2xl mb-6">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="terminal" data-weight="fill" style="font-variation-settings: 'FILL' 1;">terminal</span>
</div>
<h2 class="text-3xl font-extrabold tracking-tighter text-on-surface mb-2 font-headline">Welcome Back</h2>
<p class="text-on-surface-variant text-sm font-body">Authenticate to resume your session.</p>
</div>
<form class="space-y-6">
<div class="space-y-2">
<label class="text-[10px] font-mono uppercase tracking-[0.1em] text-on-surface-variant ml-1">Terminal ID</label>
<div class="relative">
<input class="w-full bg-surface-container-highest border-none rounded-2xl py-4 px-5 text-on-surface placeholder:text-on-surface-variant/30 focus:ring-2 focus:ring-primary/20 transition-all font-mono" placeholder="username@freelance-cli" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="text-[10px] font-mono uppercase tracking-[0.1em] text-on-surface-variant ml-1">Access Key</label>
<div class="relative">
<input class="w-full bg-surface-container-highest border-none rounded-2xl py-4 px-5 text-on-surface placeholder:text-on-surface-variant/30 focus:ring-2 focus:ring-primary/20 transition-all font-mono" placeholder="••••••••••••" type="password"/>
</div>
</div>
<div class="pt-2">
<button class="w-full bg-primary-container text-on-primary-container font-black py-4 rounded-3xl hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2 text-base shadow-[0_0_20px_rgba(156,255,147,0.2)]" type="submit">
<span class="material-symbols-outlined" data-icon="login">login</span>
                            Execute Login
                        </button>
</div>
</form>
<div class="mt-8 flex items-center gap-4">
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
<span class="text-[10px] font-mono uppercase tracking-widest text-on-surface-variant/50">OR</span>
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
</div>
<div class="mt-8">
<button class="w-full bg-surface-variant text-on-surface font-semibold py-4 rounded-3xl hover:bg-[#2c2c2c] active:scale-[0.98] transition-all flex items-center justify-center gap-3 border border-outline-variant/10">
<img alt="GitHub Logo" class="w-5 h-5 invert" data-alt="minimalist white github octocat logo icon on transparent background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBAkXG33pzYJquOt7UvWDUO-dNJpcO2eK41-82nOFQF3UTWWtJp1ScpWvkaNORTxL7817MAqZE8dF26T5LBrQbxtw6iafsRYzHHPA643aBvlwzguHlvcc4Xg0oVjwIoPUexyGCI9mziSUCtVh8CuyAiPiCIiO87LAzTCbajIKUnUe8kB9gjAcxVDapUwuMHFq4ZM3GrvWbOGwfIRNzSFESvGPJVKTnNYD8Gj9rwFThvxUoQ7T6fE_1_qmHkEQWUgc-MhW9D0xHBUbo"/>
                        Continue with GitHub
                    </button>
</div>
<div class="mt-10 text-center">
<a class="text-xs font-medium text-on-surface-variant hover:text-primary transition-colors" href="#">Forgot your access key?</a>
</div>
</div>
<!-- Footer Metadata -->
<div class="mt-8 flex justify-between items-center px-4">
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
<span class="text-[10px] font-mono text-on-surface-variant uppercase tracking-widest">System Online</span>
</div>
<div class="text-[10px] font-mono text-on-surface-variant uppercase tracking-widest">
                    Node: US-EAST-01
                </div>
</div>
</div>
</main>
<!-- Background Decoration -->
<div class="fixed inset-0 pointer-events-none -z-10">
<div class="absolute top-0 right-0 w-1/3 h-1/3 bg-primary/5 blur-[150px] rounded-full"></div>
<div class="absolute bottom-0 left-0 w-1/4 h-1/4 bg-primary/5 blur-[120px] rounded-full"></div>
</div>
</body></html>
